<script>
document.getElementById('calculateBtn').addEventListener('click', () => {
  const val = id => parseFloat(document.getElementById(id).value) || 0;

  // --- Gather inputs ---
  const revenue = val('revenue'),
        relocation = val('relocation'),
        expenses = val('expenses'),
        rent = val('rent'),
        commute = val('commute'),
        utilities = val('utilities'),
        council = val('council'),
        childcare = val('childcare'),
        distLondon = val('distanceLondon'),
        commuteTime = val('commuteTime'),
        proximity = val('proximityBase'),
        quality = val('quality');

  const wrapCare = document.getElementById('wrapCare').value;
  const ofsted = document.getElementById('ofsted').value;

  // --- Adjust childcare & quality multipliers ---
  const wrapAdj = wrapCare === 'yes' ? 0.9 : 1.1;
  const ofstedMult =
    ofsted === 'outstanding' ? 1.1 :
    ofsted === 'good' ? 1.05 :
    ofsted === 'requires' ? 0.95 : 0.9;

  const adjustedChildcare = childcare * wrapAdj * ofstedMult;
  const qualityMult = 1 + (quality - 5) * 0.02;

  // --- Totals & cash flow ---
  const livingCosts = rent + commute + utilities + council;
  const totalMonthly = (expenses + livingCosts + adjustedChildcare) * qualityMult;
  const cashFlow = revenue - totalMonthly;

  let runway = 0;
  if (cashFlow < 0 && relocation > 0) {
    runway = Math.max(0, Math.floor(relocation / Math.abs(cashFlow)));
  } else if (cashFlow > 0) {
    runway = Infinity;
  }

  // --- Life Design Index (LDI) ---
  const affordability = Math.max(0, 100 - ((totalMonthly / Math.max(revenue, 1)) * 100));
  const qualityScore = quality * 10;
  const commutePenalty = Math.min(100, (commuteTime / 1.5) + (distLondon / 3));
  const connectivity = Math.max(0, 100 - commutePenalty);
  const proximityScore = Math.max(0, 100 - (proximity * 1.5));
  const ldi = Math.round((affordability * 0.4) + (qualityScore * 0.25) + (connectivity * 0.25) + (proximityScore * 0.1));

  // --- Insight feedback ---
  let insight = '';
  if (cashFlow > 0) insight = '✅ Positive cash flow — sustainable relocation.';
  else if (runway < 6) insight = '⚠️ Under 6 months runway — reduce living costs.';
  else if (runway < 12) insight = '🕐 6–12 months runway — stabilise cash flow.';
  else insight = '💪 Strong runway — financially confident position.';
  if (ldi > 80) insight += ' Excellent overall balance.';
  else if (ldi < 60) insight += ' Consider reviewing commute or family proximity.';

  // --- Update text & progress bar ---
  document.getElementById('totalExpenses').innerText = totalMonthly.toFixed(2);
  document.getElementById('cashFlow').innerText = cashFlow.toFixed(2);
  document.getElementById('runwayMonths').innerText =
    !isFinite(runway) ? 'Unlimited' :
    runway <= 0 ? '0' : runway.toString();
  document.getElementById('ldiScore').innerText = ldi;
  document.getElementById('ldiBar').style.width = `${ldi}%`;
  document.getElementById('insight').innerText = insight;
  document.getElementById('results').classList.remove('hidden');

  // --- Pie Chart ---
  const svg = document.getElementById('chart');
  svg.innerHTML = '';
  const w = svg.clientWidth || 400;
  const h = svg.clientHeight || 300;
  const radius = Math.min(w, h) / 2 - 10;
  const cx = w / 2, cy = h / 2;

  const data = [
    { label: 'Rent', value: rent, color: '#4F46E5' },
    { label: 'Commute', value: commute, color: '#10B981' },
    { label: 'Utilities', value: utilities, color: '#F59E0B' },
    { label: 'Council Tax', value: council, color: '#EF4444' },
    { label: 'Childcare', value: adjustedChildcare, color: '#8B5CF6' }
  ];
  const total = data.reduce((s, d) => s + d.value, 0) || 1;

  let startAngle = 0;
  data.forEach(d => {
    const sliceAngle = (d.value / total) * 2 * Math.PI;
    const x1 = cx + radius * Math.cos(startAngle);
    const y1 = cy + radius * Math.sin(startAngle);
    const x2 = cx + radius * Math.cos(startAngle + sliceAngle);
    const y2 = cy + radius * Math.sin(startAngle + sliceAngle);
    const largeArc = sliceAngle > Math.PI ? 1 : 0;
    const pathData = [
      `M ${cx} ${cy}`,
      `L ${x1} ${y1}`,
      `A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}`,
      'Z'
    ].join(' ');
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathData);
    path.setAttribute('fill', d.color);
    path.setAttribute('stroke', 'white');
    path.setAttribute('stroke-width', '1');
    // Tooltip
    path.addEventListener('mousemove', e => {
      tooltip.style.opacity = 1;
      tooltip.innerText = `${d.label}: £${d.value.toFixed(0)}`;
      tooltip.style.left = e.pageX + 10 + 'px';
      tooltip.style.top = e.pageY - 20 + 'px';
    });
    path.addEventListener('mouseleave', () => tooltip.style.opacity = 0);
    svg.appendChild(path);
    startAngle += sliceAngle;
  });

  // Legend
  const legendY = h - 20;
  data.forEach((d, i) => {
    const legendX = 20 + i * 90;
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', legendX);
    rect.setAttribute('y', legendY - 10);
    rect.setAttribute('width', 12);
    rect.setAttribute('height', 12);
    rect.setAttribute('fill', d.color);
    svg.appendChild(rect);
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', legendX + 18);
    text.setAttribute('y', legendY);
    text.setAttribute('font-size', '10');
    text.textContent = d.label;
    svg.appendChild(text);
  });
});

// --- Tooltip element ---
const tooltip = document.createElement('div');
tooltip.style.position = 'fixed';
tooltip.style.pointerEvents = 'none';
tooltip.style.background = 'rgba(0,0,0,0.7)';
tooltip.style.color = 'white';
tooltip.style.padding = '4px 8px';
tooltip.style.borderRadius = '4px';
tooltip.style.fontSize = '12px';
tooltip.style.transition = 'opacity 0.2s';
tooltip.style.opacity = 0;
document.body.appendChild(tooltip);
</script>
</body>
</html>
